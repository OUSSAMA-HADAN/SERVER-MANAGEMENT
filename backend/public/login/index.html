<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>oussama's homelab</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=UnifrakturMaguntia&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
::root{
  --bg:#020304;
  --surface:rgba(8,10,12,0.92);
  --border:rgba(180,0,0,0.25);
  --border2:rgba(180,0,0,0.5);
  --text:#8a9ba8;--dim:#3a4a54;--bright:#c8d8e0;
  --red:#cc0000;--redglow:#ff2200;--redsoft:#ff4444;
  --font-mono:'Share Tech Mono',monospace;
  --font-gothic:'UnifrakturMaguntia',cursive;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;overflow:hidden}

/* ── ANIMATED BG ── */
.bg-canvas{position:fixed;inset:0;z-index:0}

/* rain */
.rain{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.drop{position:absolute;top:-20px;width:1px;background:linear-gradient(to bottom,transparent,rgba(180,0,0,0.4));animation:fall linear infinite;opacity:0}
@keyframes fall{0%{top:-20px;opacity:0}10%{opacity:1}90%{opacity:.4}100%{top:110vh;opacity:0}}

/* scanlines */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);pointer-events:none;z-index:9998}

/* vignette */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.92) 100%);pointer-events:none;z-index:2}

/* ── GRID LINES ── */
.grid-lines{position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:linear-gradient(rgba(150,0,0,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(150,0,0,0.04) 1px,transparent 1px);
  background-size:60px 60px;
}

/* ── GLITCH TEXT ── */
@keyframes glitch1{
  0%,94%,100%{clip-path:inset(0 0 100% 0);transform:translate(0)}
  95%{clip-path:inset(20% 0 50% 0);transform:translate(-4px,1px)}
  96%{clip-path:inset(60% 0 10% 0);transform:translate(4px,-1px)}
  97%{clip-path:inset(40% 0 30% 0);transform:translate(-2px,2px)}
}
@keyframes glitch2{
  0%,94%,100%{clip-path:inset(0 0 100% 0);transform:translate(0)}
  95%{clip-path:inset(50% 0 20% 0);transform:translate(4px,-1px)}
  96%{clip-path:inset(10% 0 70% 0);transform:translate(-4px,1px)}
  97%{clip-path:inset(70% 0 5% 0);transform:translate(2px,-2px)}
}
@keyframes flicker{
  0%,19%,21%,23%,25%,54%,56%,100%{opacity:1}
  20%,24%,55%{opacity:.4}
}

/* ── PAGE ── */
.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:10}

/* ── CARD ── */
.card{
  width:100%;max-width:400px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px;
  padding:40px 36px 36px;
  position:relative;
  box-shadow:0 0 60px rgba(180,0,0,0.08),0 0 120px rgba(0,0,0,0.8),inset 0 0 40px rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
}

/* corner decorations */
.card::before,.card::after{
  content:'';position:absolute;width:16px;height:16px;
  border-color:var(--red);border-style:solid;
}
.card::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}

.corner-tr,.corner-bl{position:absolute;width:16px;height:16px;border-color:var(--red);border-style:solid}
.corner-tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
.corner-bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}

/* ── BRAND ── */
.brand{text-align:center;margin-bottom:32px;position:relative}

.skull{font-size:28px;margin-bottom:8px;display:block;animation:flicker 4s infinite;filter:drop-shadow(0 0 8px rgba(200,0,0,0.6))}

.brand-name{
  font-family:var(--font-gothic);
  font-size:30px;
  color:#cc2200;
  text-shadow:0 0 20px rgba(200,0,0,0.5),0 0 40px rgba(200,0,0,0.2);
  line-height:1.1;
  animation:flicker 6s infinite;
  position:relative;
  display:inline-block;
}
/* glitch layers */
.brand-name::before,.brand-name::after{
  content:attr(data-text);
  position:absolute;inset:0;
  font-family:var(--font-gothic);
  font-size:30px;
}
.brand-name::before{color:#ff0000;animation:glitch1 5s infinite;text-shadow:2px 0 rgba(255,0,0,0.6)}
.brand-name::after{color:#660000;animation:glitch2 5s infinite 0.1s;text-shadow:-2px 0 rgba(100,0,0,0.6)}

.brand-sub{
  font-size:9px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--dim);
  margin-top:10px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.brand-sub::before,.brand-sub::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--border2))}
.brand-sub::after{background:linear-gradient(to left,transparent,var(--border2))}

/* ── FIELDS ── */
.field{margin-bottom:16px;position:relative}
.field label{
  display:block;font-size:9px;letter-spacing:.18em;
  text-transform:uppercase;color:rgba(180,0,0,0.6);margin-bottom:6px;
}
.field input{
  width:100%;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(100,0,0,0.3);
  border-radius:3px;
  padding:11px 14px;
  font-family:var(--font-mono);
  font-size:13px;
  color:#c8d8e0;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
  letter-spacing:.04em;
}
.field input:focus{
  border-color:rgba(180,0,0,0.7);
  box-shadow:0 0 0 3px rgba(150,0,0,0.1),0 0 20px rgba(150,0,0,0.08);
}
.field input::placeholder{color:rgba(50,60,70,0.8)}

/* cursor blink on focused input */
.field input:focus{caret-color:#cc0000}

/* ── LOGIN BTN ── */
.btn-login{
  width:100%;margin-top:6px;
  background:rgba(120,0,0,0.15);
  border:1px solid rgba(180,0,0,0.4);
  border-radius:3px;
  padding:12px;
  font-family:var(--font-mono);
  font-size:11px;
  font-weight:700;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:#cc2200;
  cursor:pointer;
  transition:all .2s;
  position:relative;
  overflow:hidden;
}
.btn-login::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(180,0,0,0.06),transparent);
  transform:translateX(-100%);
  transition:transform .4s;
}
.btn-login:hover::before{transform:translateX(100%)}
.btn-login:hover{
  background:rgba(150,0,0,0.22);
  border-color:rgba(200,0,0,0.7);
  box-shadow:0 0 20px rgba(150,0,0,0.15);
  color:#ff3300;
}
.btn-login:active{transform:scale(.99)}
.btn-login:disabled{opacity:.4;cursor:not-allowed}
.btn-login .spinner{display:none;width:14px;height:14px;border:2px solid rgba(180,0,0,0.3);border-top-color:#cc0000;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
.btn-login.loading .btn-text{display:none}
.btn-login.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── ERROR ── */
.error-msg{
  margin-top:12px;
  padding:9px 12px;
  background:rgba(120,0,0,0.12);
  border:1px solid rgba(180,0,0,0.3);
  border-radius:3px;
  font-size:11px;
  color:#cc3333;
  display:none;
  animation:shake .3s ease;
  letter-spacing:.04em;
}
.error-msg.show{display:block}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ── WARNING TEXT ── */
.warning-text{
  text-align:center;
  margin-top:20px;
  font-size:9px;
  color:rgba(80,0,0,0.8);
  letter-spacing:.1em;
  text-transform:uppercase;
  line-height:1.8;
}

/* ── MOBILE ── */
@media(max-width:480px){
  .card{padding:30px 20px 26px}
  .brand-name{font-size:24px}
  .brand-name::before,.brand-name::after{font-size:24px}
}
</style>
</head>
<body>

<div class="grid-lines"></div>
<div class="rain" id="rain"></div>

<div class="page">
  <div class="card">
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>

    <div class="brand">
      <span class="skull">☠</span>
      <div class="brand-name" data-text="oussama's homelab">oussama's homelab</div>
      <div class="brand-sub">restricted access</div>
    </div>

    <div class="field">
      <label>// identifier</label>
      <input type="text" id="username" placeholder="enter username" autocomplete="username" autofocus/>
    </div>
    <div class="field">
      <label>// passphrase</label>
      <input type="password" id="password" placeholder="••••••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <span class="btn-text">⟶ &nbsp; authenticate</span>
      <div class="spinner"></div>
    </button>

    <div class="error-msg" id="error-msg">access denied</div>

    <div class="warning-text">
      unauthorized access is monitored<br/>and will be prosecuted
    </div>
  </div>
</div>

<script>
// ── RAIN ──────────────────────────────────────────────────
(function() {
  const rain = document.getElementById('rain');
  for (let i = 0; i < 60; i++) {
    const drop = document.createElement('div');
    drop.className = 'drop';
    const left = Math.random() * 100;
    const height = 40 + Math.random() * 80;
    const duration = 1.5 + Math.random() * 3;
    const delay = Math.random() * 4;
    drop.style.cssText = `left:${left}%;height:${height}px;animation-duration:${duration}s;animation-delay:${delay}s`;
    rain.appendChild(drop);
  }
})();

// ── LOGIN ─────────────────────────────────────────────────
document.getElementById('password').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
document.getElementById('username').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('password').focus(); });

async function doLogin() {
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  if (!username || !password) {
    err.textContent = 'credentials required';
    err.classList.add('show');
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;
  err.classList.remove('show');

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = '/';
    } else {
      throw new Error(data.error || 'access denied');
    }
  } catch(e) {
    err.textContent = e.message || 'access denied';
    err.classList.add('show');
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}
</script>
</body>
</html>
